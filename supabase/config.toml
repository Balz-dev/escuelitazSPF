
[functions.invite-user]
enabled = true
verify_jwt = true
import_map = "./functions/invite-user/deno.json"
entrypoint = "./functions/invite-user/index.ts"

# Función pública: cualquier usuario la puede llamar sin sesión para pedir su restablecimiento
[functions.request-password-reset]
enabled = true
verify_jwt = false
entrypoint = "./functions/request-password-reset/index.ts"

# Función privada: solo Directors/Admins autenticados pueden generar contraseñas
[functions.reset-password]
enabled = true
verify_jwt = true
entrypoint = "./functions/reset-password/index.ts"
